name: Sync README digest
on:
  push:
    branches: ["main"]
    paths: ["rag-chunking-bench/research/NOTES.md"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate the Latest section
        run: |
          python scripts/sync_latest.py --selftest
          python scripts/sync_latest.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Sync README digest with the latest research log entry" README.md
            git push
          fi
